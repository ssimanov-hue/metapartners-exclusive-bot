# Только деплой. Сборка: Railway сам находит Dockerfile в корне репозитория.
# Если снова «Dockerfile does not exist»: в UI сервиса очистите Root Directory (должен быть корень репо)
# или в Variables задайте RAILWAY_DOCKERFILE_PATH=Dockerfile
# https://docs.railway.com/deploy/dockerfiles

[deploy]
healthcheckPath = "/"
